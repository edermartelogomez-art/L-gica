<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validez del razonamiento lógico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#F8FAFC;--bg3:#F1F5F9;--text:#0F172A;--muted:#64748B;--border:#E2E8F0;--border2:#CBD5E1;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;--blue-b:#BFDBFE;--blue-d:#1E3A8A;
  --green:#15803D;--green-bg:#F0FDF4;--green-b:#BBF7D0;--green-d:#14532D;
  --red:#DC2626;--red-bg:#FEF2F2;--red-b:#FECACA;--red-d:#7F1D1D;
  --yellow:#B45309;--yellow-bg:#FFFBEB;--yellow-b:#FDE68A;
  --mono:'Courier New',monospace;--sans:'Segoe UI',system-ui,sans-serif;
  --r:10px;--r2:14px;
}
body{font-family:var(--sans);background:var(--bg3);color:var(--text);min-height:100vh;padding:0 0 4rem}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:14px;font-weight:600;color:var(--text)}
.topbar span{font-size:12px;color:var(--muted)}
.pbar{height:3px;background:var(--blue-bg)}
.pfill{height:100%;background:var(--blue);transition:width .4s;width:16.6%}
.nav-pills{display:flex;gap:6px;padding:1.25rem 1.5rem .5rem;flex-wrap:wrap;max-width:920px;margin:0 auto}
.pill{font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.04em;text-transform:uppercase}
.pill:hover{background:var(--bg2);color:var(--text)}
.pill.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pill.done{background:var(--green-bg);border-color:var(--green-b);color:var(--green)}
.sec{display:none;max-width:920px;margin:0 auto;padding:0 1.5rem 2rem;animation:fi .2s ease}
.sec.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;padding-top:1.5rem}
.stitle{font-size:24px;font-weight:700;color:var(--text);margin-bottom:.3rem}
.sdesc{font-size:14px;color:var(--muted);margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);line-height:1.6}
.box{border-radius:var(--r2);padding:1rem 1.2rem;border:1px solid;margin-bottom:.75rem}
.bl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}
.box p,.box li{font-size:14px;line-height:1.75}
.box ul,.box ol{padding-left:1.4rem}
.box li{margin-bottom:.3rem}
.bi{background:var(--blue-bg);border-color:var(--blue-b)}.bi .bl{color:var(--blue)}
.bk{background:var(--bg2);border-color:var(--border)}.bk .bl{color:var(--muted)}
.bw{background:var(--yellow-bg);border-color:var(--yellow-b)}.bw .bl{color:var(--yellow)}
.be{background:var(--red-bg);border-color:var(--red-b)}.be .bl{color:var(--red)}
.bs{background:var(--green-bg);border-color:var(--green-b)}.bs .bl{color:var(--green)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.mono{font-family:var(--mono);font-size:14px;color:var(--blue-d)}
.rbox{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;text-align:center}
.rbox .mono{font-size:17px;display:block;margin-bottom:.35rem}
.rbox p{font-size:12px;color:var(--muted);line-height:1.5}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.byes{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.bno{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.beq{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg);border-radius:var(--r2);overflow:hidden;border:1px solid var(--border)}
.tbl th{background:var(--bg2);padding:8px 12px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg2)}
.rvl{font-family:var(--sans);font-size:12px;font-weight:600;padding:5px 13px;border-radius:var(--r);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);transition:all .15s;display:inline-block;margin-top:.5rem}
.rvl:hover{background:var(--bg2);color:var(--text)}
.btn{font-family:var(--sans);font-size:13px;font-weight:600;padding:8px 18px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);cursor:pointer;color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:var(--blue-d)}
.btn-sm{font-size:12px;padding:5px 12px}
.btn-g{color:var(--muted);border-color:transparent;background:transparent}
.btn-g:hover{color:var(--text);background:var(--bg2);border-color:var(--border)}
.nav-btns{display:flex;justify-content:space-between;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
.tt-tog{display:flex;gap:.3rem;margin-top:.3rem}
.tval{padding:5px 14px;border-radius:var(--r);border:1px solid var(--border);font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--text)}
.tval.on-v{background:var(--green-bg);border-color:var(--green-b);color:var(--green-d)}
.tval.on-f{background:var(--red-bg);border-color:var(--red-b);color:var(--red-d)}
.tt-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem;margin-top:.75rem}
.ttc{border-radius:var(--r);padding:.65rem .5rem;text-align:center;border:1px solid var(--border)}
.ttc-l{font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:.2rem}
.ttc-v{font-size:20px;font-weight:700;font-family:var(--mono)}
.ttc.tv{background:var(--green-bg);border-color:var(--green-b)}.ttc.tv .ttc-v{color:var(--green)}
.ttc.tf{background:var(--red-bg);border-color:var(--red-b)}.ttc.tf .ttc-v{color:var(--red)}
.qopt{width:100%;display:flex;align-items:flex-start;gap:.65rem;padding:.7rem .9rem;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg);font-size:13px;color:var(--text);text-align:left;margin-bottom:.4rem;font-family:var(--sans)}
.qopt:hover{background:var(--bg2);border-color:var(--border2)}
.qopt.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-d)}
.qopt.ok{border-color:var(--green);background:var(--green-bg);color:var(--green-d);pointer-events:none}
.qopt.bad{border-color:var(--red);background:var(--red-bg);color:var(--red-d);pointer-events:none}
.qopt.reveal-ok{border-color:var(--green);background:var(--green-bg);color:var(--green-d);pointer-events:none}
.qltr{width:22px;height:22px;border-radius:50%;background:var(--bg3);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.qfb{font-size:13px;margin-top:.6rem;padding:.7rem .9rem;border-radius:var(--r);display:none;line-height:1.6}
.qfb.show{display:block}
.qfb.ok{background:var(--green-bg);color:var(--green-d);border:1px solid var(--green-b)}
.qfb.bad{background:var(--red-bg);color:var(--red-d);border:1px solid var(--red-b)}
.score-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:2.5rem;text-align:center;margin-top:1rem;display:none}
.score-card.show{display:block}
.score-num{font-size:56px;font-weight:700;color:var(--blue)}
.cls-pool{display:flex;flex-wrap:wrap;gap:.45rem;padding:.7rem;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);min-height:48px;margin-bottom:.65rem}
.ci{padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:13px;cursor:pointer;transition:all .15s;color:var(--text)}
.ci:hover{background:var(--blue-bg);border-color:var(--blue-b);color:var(--blue-d)}
.ci.sel-ci{outline:2px solid var(--blue);background:var(--blue-bg);color:var(--blue-d)}
.ci.placed{opacity:.35;pointer-events:none}
.cls-bins{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.cbin{border-radius:var(--r2);padding:.8rem;border:2px dashed var(--border2);min-height:80px;cursor:pointer;transition:border-color .15s}
.cbin:hover{border-color:var(--border)}
.cbin.vbin{border-color:var(--green-b);background:var(--green-bg)}
.cbin.ebin{border-color:var(--red-b);background:var(--red-bg)}
.cbin-t{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem}
.cbin.vbin .cbin-t{color:var(--green)}
.cbin.ebin .cbin-t{color:var(--red)}
.ctag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin:2px}
.ctag.v{background:var(--green-bg);color:var(--green-d);border:1px solid var(--green-b)}
.ctag.e{background:var(--red-bg);color:var(--red-d);border:1px solid var(--red-b)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:.75rem;text-align:center}
.stat-n{font-size:24px;font-weight:700;color:var(--blue)}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px}
hr{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}.nav-pills,.sec{padding-left:1rem;padding-right:1rem}.cls-bins{grid-template-columns:1fr}.tt-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="topbar">
  <h1>Validez del razonamiento lógico</h1>
  <span>Eder Santiago Martelo</span>
</div>
<div class="pbar"><div class="pfill" id="prog"></div></div>
<div class="nav-pills" id="nav"></div>
<div id="secs"></div>

<script>
const SECS=[
  {id:'s0',label:'1. Fundamentos',tag:'Sección 1',title:'Argumentos y proposiciones',desc:'Las bases del razonamiento lógico: qué son proposiciones, los conectores lógicos y cómo se forma un argumento.'},
  {id:'s1',label:'2. Validez',tag:'Sección 2',title:'Validez lógica',desc:'La propiedad más importante de un argumento. La validez depende de la forma lógica, no del contenido.'},
  {id:'s2',label:'3. Implicaciones',tag:'Sección 3',title:'Las cuatro formas de una implicación',desc:'Directa, recíproca, contraria y contrarrecíproca — cuáles son equivalentes y por qué.'},
  {id:'s3',label:'4. Tabla de verdad',tag:'Sección 4',title:'Explorador interactivo de tablas de verdad',desc:'Cambia el valor de p y q con un clic y observa cómo cambian todos los conectivos en tiempo real.'},
  {id:'s4',label:'5. Actividades',tag:'Sección 5',title:'Actividades para clase',desc:'Clasifica argumentos, detecta errores del mundo real, y tarjetas de debate para grupos.'},
  {id:'s5',label:'6. Quiz',tag:'Sección 6',title:'Quiz de comprensión',desc:'10 preguntas con retroalimentación instantánea. Al finalizar verás tu puntaje y explicación de cada respuesta.'},
];
let cur=0;
const nav=document.getElementById('nav');
const secsEl=document.getElementById('secs');
SECS.forEach((s,i)=>{
  const p=document.createElement('button');
  p.className='pill'+(i===0?' on':'');p.textContent=s.label;p.onclick=()=>goSec(i);nav.appendChild(p);
  const d=document.createElement('div');
  d.id=s.id;d.className='sec'+(i===0?' on':'');
  d.innerHTML=`<div class="stag">${s.tag}</div><div class="stitle">${s.title}</div><div class="sdesc">${s.desc}</div><div id="${s.id}-body"></div>`;
  secsEl.appendChild(d);
});
function goSec(n){
  document.getElementById(SECS[cur].id).classList.remove('on');
  nav.children[cur].classList.remove('on');
  cur=n;
  document.getElementById(SECS[cur].id).classList.add('on');
  nav.children[cur].classList.add('on');
  document.getElementById('prog').style.width=((cur+1)/SECS.length*100)+'%';
  window.scrollTo({top:0,behavior:'smooth'});
}
function nb(n){
  return `<div class="nav-btns">${n>0?`<button class="btn btn-g" onclick="goSec(${n-1})">← ${SECS[n-1].label}</button>`:'<span></span>'}<button class="btn btn-p" onclick="goSec(${Math.min(n+1,SECS.length-1)})">${n+1<SECS.length?'Siguiente: '+SECS[n+1].label+' →':'Completado'}</button></div>`;
}

/* ── SECCIÓN 0 ── */
document.getElementById('s0-body').innerHTML=`
<div class="box bi"><div class="bl">¿Qué es una proposición?</div>
<p>Un enunciado declarativo que puede ser <strong>verdadero</strong> o <strong>falso</strong>, pero no ambos. Las preguntas, órdenes y exclamaciones no son proposiciones.</p>
<div class="g2" style="margin-top:.7rem">
<div style="background:var(--green-bg);border:1px solid var(--green-b);border-radius:var(--r);padding:.75rem"><div class="bl" style="color:var(--green)">Sí son proposiciones</div><ul style="font-size:13px"><li>"El cielo es azul" — Verdadera</li><li>"2 + 2 = 5" — Falsa</li><li>"Juan tiene ansiedad" — V o F</li></ul></div>
<div style="background:var(--red-bg);border:1px solid var(--red-b);border-radius:var(--r);padding:.75rem"><div class="bl" style="color:var(--red)">No son proposiciones</div><ul style="font-size:13px"><li>"¿Está lloviendo?" — pregunta</li><li>"¡Cierra la puerta!" — orden</li><li>"Ojalá pase el examen" — deseo</li></ul></div>
</div></div>
<div class="box bk"><div class="bl">Estructura de un argumento</div>
<div class="g2">
<div style="background:var(--blue-bg);border:1px solid var(--blue-b);border-radius:var(--r);padding:.75rem"><div class="bl" style="color:var(--blue)">Premisas</div><p style="font-size:13px">Afirmaciones de partida que dan soporte al argumento. Se aceptan temporalmente para evaluar la estructura lógica.</p></div>
<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.75rem"><div class="bl">Conclusión</div><p style="font-size:13px">La afirmación que se justifica. Se identifica con: <em>por lo tanto, entonces, se concluye, luego…</em></p></div>
</div></div>
<hr>
<p style="font-size:14px;font-weight:600;margin-bottom:.75rem">Conectores lógicos fundamentales</p>
<div class="g3">
<div class="rbox"><span class="mono">¬p</span><strong style="display:block;font-size:13px;margin-bottom:.2rem">Negación</strong><p>"No p" — invierte el valor de verdad</p></div>
<div class="rbox"><span class="mono">p ∧ q</span><strong style="display:block;font-size:13px;margin-bottom:.2rem">Conjunción</strong><p>"p y q" — V solo si ambas son V</p></div>
<div class="rbox"><span class="mono">p ∨ q</span><strong style="display:block;font-size:13px;margin-bottom:.2rem">Disyunción</strong><p>"p o q" — V si al menos una es V</p></div>
<div class="rbox"><span class="mono">p → q</span><strong style="display:block;font-size:13px;margin-bottom:.2rem">Implicación</strong><p>"Si p entonces q" — F solo si p=V y q=F</p></div>
<div class="rbox"><span class="mono">p ↔ q</span><strong style="display:block;font-size:13px;margin-bottom:.2rem">Bicondicional</strong><p>"p si y solo si q" — V cuando ambas iguales</p></div>
<div class="rbox"><span class="mono">∴</span><strong style="display:block;font-size:13px;margin-bottom:.2rem">Por lo tanto</strong><p>Símbolo que introduce la conclusión del argumento</p></div>
</div>
<div class="box bw" style="margin-top:.75rem"><div class="bl">Caso de estudio — el error del problema inicial</div>
<p style="font-family:var(--mono);font-size:13px;line-height:2">P1: Si hay ansiedad → bajo rendimiento<br>P2: Juan tiene bajo rendimiento<br>∴ &nbsp;Juan tiene ansiedad</p>
<button class="rvl" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">Analizar argumento ↓</button>
<div style="display:none;margin-top:.5rem;background:var(--red-bg);border:1px solid var(--red-b);border-radius:var(--r);padding:.8rem;font-size:13px;line-height:1.7;color:var(--red-d)"><strong>Argumento inválido.</strong> El bajo rendimiento puede tener múltiples causas: problemas familiares, económicos, de salud, falta de sueño, etc. El argumento comete el error de <strong>afirmar el consecuente</strong>, que estudiaremos en detalle en la siguiente sección.</div>
</div>
${nb(0)}`;

/* ── SECCIÓN 1 ── */
document.getElementById('s1-body').innerHTML=`
<div class="box bi"><div class="bl">Definición formal de validez</div>
<p>Un argumento es <strong>válido</strong> si es <em>imposible</em> que todas sus premisas sean verdaderas y su conclusión sea falsa simultáneamente. La verdad de las premisas <em>obliga necesariamente</em> a la verdad de la conclusión.</p></div>
<div class="g2">
<div class="box bs" style="margin-bottom:0"><div class="bl">Argumento válido</div><ul><li>La conclusión se sigue necesariamente de las premisas</li><li>No existe ningún contraejemplo posible</li><li>La forma garantiza la conclusión</li></ul><div style="font-family:var(--mono);font-size:13px;background:var(--bg);border:1px solid var(--green-b);border-radius:var(--r);padding:.65rem;margin-top:.6rem;line-height:2">p→q, p ⊢ q</div></div>
<div class="box be" style="margin-bottom:0"><div class="bl">Argumento inválido</div><ul><li>Existe al menos un caso donde premisas=V y conclusión=F</li><li>La forma lógica tiene una "fuga"</li><li>El contenido puede ocultar el error</li></ul><div style="font-family:var(--mono);font-size:13px;background:var(--bg);border:1px solid var(--red-b);border-radius:var(--r);padding:.65rem;margin-top:.6rem;line-height:2">p→q, q ⊬ p</div></div>
</div>
<hr>
<p style="font-size:14px;font-weight:600;margin-bottom:.75rem">Validez ≠ Verdad — distinción crucial</p>
<div class="g2">
<div class="box bs" style="margin-bottom:0"><div class="bl">Válido con premisas falsas</div><p style="font-family:var(--mono);font-size:12px;line-height:2.1">P1: Todos los peces vuelan<br>P2: El salmón es un pez<br>∴ &nbsp;El salmón vuela</p><p style="font-size:13px;margin-top:.5rem">La <em>estructura</em> es válida (Modus Ponens) aunque P1 es falsa en la realidad.</p></div>
<div class="box be" style="margin-bottom:0"><div class="bl">Inválido con conclusión verdadera</div><p style="font-family:var(--mono);font-size:12px;line-height:2.1">P1: Si llueve → el piso se moja<br>P2: El piso está mojado<br>∴ &nbsp;Llovió</p><p style="font-size:13px;margin-top:.5rem">El piso pudo mojarse por otra causa. Inválido aunque la conclusión sea verdadera.</p></div>
</div>
<hr>
<p style="font-size:14px;font-weight:600;margin-bottom:.75rem">Formas válidas canónicas</p>
<div class="g2">
<div class="rbox" style="text-align:left;padding:.9rem"><div class="bl" style="color:var(--blue)">Modus Ponens (MP)</div><div style="font-family:var(--mono);font-size:14px;line-height:2.1;margin:.25rem 0">p → q<br>p<br><span style="border-top:1px solid var(--border2);display:block;padding-top:.3rem">∴ q</span></div><p style="font-size:12px;color:var(--muted)">Estudio → apruebo. Estudio. ∴ Apruebo.</p></div>
<div class="rbox" style="text-align:left;padding:.9rem"><div class="bl" style="color:var(--blue)">Modus Tollens (MT)</div><div style="font-family:var(--mono);font-size:14px;line-height:2.1;margin:.25rem 0">p → q<br>¬q<br><span style="border-top:1px solid var(--border2);display:block;padding-top:.3rem">∴ ¬p</span></div><p style="font-size:12px;color:var(--muted)">Estudio → apruebo. No aprobé. ∴ No estudié.</p></div>
<div class="rbox" style="text-align:left;padding:.9rem"><div class="bl" style="color:var(--blue)">Silogismo hipotético (SH)</div><div style="font-family:var(--mono);font-size:14px;line-height:2.1;margin:.25rem 0">p → q<br>q → r<br><span style="border-top:1px solid var(--border2);display:block;padding-top:.3rem">∴ p → r</span></div><p style="font-size:12px;color:var(--muted)">Si A→B y B→C, entonces A→C.</p></div>
<div class="rbox" style="text-align:left;padding:.9rem"><div class="bl" style="color:var(--blue)">Silogismo disyuntivo (SD)</div><div style="font-family:var(--mono);font-size:14px;line-height:2.1;margin:.25rem 0">p ∨ q<br>¬p<br><span style="border-top:1px solid var(--border2);display:block;padding-top:.3rem">∴ q</span></div><p style="font-size:12px;color:var(--muted)">Es A o B. No es A. ∴ Es B.</p></div>
</div>
<hr>
<p style="font-size:14px;font-weight:600;margin-bottom:.75rem">Errores de razonamiento frecuentes</p>
<div class="g2">

<div class="stat"><div class="stat-n" id="qleft">10</div><div class="stat-l">Por responder</div></div>
</div>
<div id="qqs">${qdata.map((q,i)=>`<div class="rbox" id="qq${i}" style="text-align:left;padding:.9rem;margin-bottom:.65rem"><div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-bottom:.4rem">Pregunta ${i+1} de ${qdata.length}</div><div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:.7rem;line-height:1.45">${q.q}</div>${q.opts.map((o,j)=>`<button class="qopt" onclick="selQ(${i},${j})" data-qi="${i}" data-oi="${j}"><span class="qltr">${'ABCD'[j]}</span>${o}</button>`).join('')}<div class="qfb" id="qfb${i}"></div></div>`).join('')}</div>
<div id="qbtns" style="display:flex;gap:.75rem;justify-content:space-between;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)">
<button class="btn btn-g" onclick="goSec(4)">← Actividades</button>
<button class="btn btn-p" onclick="submitQ()">Finalizar y ver puntaje</button>
</div>
<div class="score-card" id="scard">
<div class="score-num" id="snum">0/10</div>
<div style="font-size:14px;color:var(--muted);margin-top:.3rem">puntaje final</div>
<div style="font-size:16px;font-weight:600;color:var(--text);margin-top:1rem" id="smsg"></div>
<div style="display:flex;gap:.75rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">
<button class="btn btn-p" onclick="buildQuiz()">Repetir quiz</button>
<button class="btn btn-g" onclick="goSec(0)">Volver al inicio</button>
</div>
</div>`;
}
function selQ(qi,oi){
  if(qdone)return;
  qsels[qi]=oi;
  document.querySelectorAll(`[data-qi="${qi}"]`).forEach(b=>b.classList.remove('sel'));
  document.querySelector(`[data-qi="${qi}"][data-oi="${oi}"]`).classList.add('sel');
  const el=document.getElementById('qleft');if(el)el.textContent=qdata.length-Object.keys(qsels).length;
}
function submitQ(){
  qdone=true;let ok=0;
  qdata.forEach((q,i)=>{
    const sel=qsels[i];
    document.querySelectorAll(`[data-qi="${i}"]`).forEach(b=>{const oi=parseInt(b.dataset.oi);b.classList.remove('sel');b.style.pointerEvents='none';if(oi===q.ans)b.classList.add('ok');else if(sel!==undefined&&oi===sel)b.classList.add('bad');});
    if(sel===q.ans)ok++;
    const fb=document.getElementById('qfb'+i);
    fb.className='qfb show '+(sel===q.ans?'ok':'bad');
    fb.innerHTML=(sel===q.ans?'<strong>Correcto. </strong>':'<strong>Incorrecto. </strong>')+q.exp;
  });
  document.getElementById('qok').textContent=ok;
  document.getElementById('qbad').textContent=qdata.length-ok;
  document.getElementById('qleft').textContent=0;
  document.getElementById('snum').textContent=ok+'/'+qdata.length;
  const msgs=['Sigue practicando — repasa las secciones de validez e implicaciones.','Buen avance — revisa los errores para consolidar los conceptos.','Muy bien — dominas los conceptos fundamentales de lógica.','Excelente — razonamiento lógico impecable.'];
  document.getElementById('smsg').textContent=msgs[ok<=3?0:ok<=6?1:ok<=8?2:3];
  document.getElementById('scard').classList.add('show');
  document.getElementById('qbtns').style.display='none';
  nav.children[5].classList.add('done');
}
buildQuiz();
</script>
</body>
</html>
